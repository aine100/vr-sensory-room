<!doctype html>
<html lang="en">
  <head>
    <title>VR Sensory Room for Teenagers with Autism</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <link type="text/css" rel="stylesheet" href="https://xrblocks.github.io/css/xr.css" />
    <script>
      window.litDisableBundleWarning = true;
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
          "three/": "https://cdn.jsdelivr.net/npm/three@0.184.0/",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/",
          "troika-three-text": "https://cdn.jsdelivr.net/gh/protectwise/troika@028b81cf308f0f22e5aa8e78196be56ec1997af5/packages/troika-three-text/src/index.js",
          "troika-three-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-three-utils/src/index.js",
          "troika-worker-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-worker-utils/src/index.js",
          "bidi-js": "https://esm.sh/bidi-js@%5E1.0.2?target=es2022",
          "webgl-sdf-generator": "https://esm.sh/webgl-sdf-generator@1.1.1/es2022/webgl-sdf-generator.mjs",
          "@pmndrs/uikit": "https://cdn.jsdelivr.net/npm/@pmndrs/uikit@1.0.56/dist/index.min.js",
          "@pmndrs/uikit-pub-sub": "https://cdn.jsdelivr.net/npm/@pmndrs/uikit-pub-sub@1.0.56/dist/index.min.js",
          "@pmndrs/msdfonts": "https://cdn.jsdelivr.net/npm/@pmndrs/msdfonts@1.0.56/dist/index.min.js",
          "@preact/signals-core": "https://cdn.jsdelivr.net/npm/@preact/signals-core@1.12.1/dist/signals-core.mjs",
          "yoga-layout/load": "https://cdn.jsdelivr.net/npm/yoga-layout@3.2.1/dist/src/load.js",
          "uiblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.16.0/build/addons/uiblocks/src/index.js",
          "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.16.0/build/xrblocks.js"
        }
      }
    </script>
  </head>
  <body>
    <script type="module">
      import * as uikit from '@pmndrs/uikit';
      import * as THREE from 'three';
      import { Text } from 'troika-three-text';
      import { raycastSortFunction } from 'uiblocks';
      import * as xb from 'xrblocks';

      class SensoryRoomScript extends xb.Script {
        constructor() {
          super();
          this.ambientLight = null;
          this.directionalLight = null;
          
          // State Variables
          this.currentThemeIndex = 0;
          this.bubbleSpeedMultiplier = 1.0;
          this.lightIntensity = 2.0;
          this.bubblesActive = true;
          this.lampsActive = true;
          this._taylorPlaying = false;

          this.tempLabels = []; // Added to track and orient temporary labels

          // Object Collections for Interactivity
          this.movableObjects = [];
          this.collidableBoxes = [];
          this.grabbedObject = null;
          this.grabController = null;
          this.grabOffset = new THREE.Vector3();

          // Room Dimensions
          this.roomWidth = 10;
          this.roomHeight = 4;
          this.roomDepth = 10;

          // Locomotion state
          this.moveVelocity = new THREE.Vector3();
          this.keys = { w: false, a: false, s: false, d: false };

          // Expanded color themes for rich environmental mood selection
          this.themes = [
            { name: 'Ocean Calm', color: 0x142850, lightColor: 0x63b3ed, bubbleColor: 0x4299e1 },
            { name: 'Forest Serenity', color: 0x123524, lightColor: 0x68d391, bubbleColor: 0x48bb78 },
            { name: 'Lavender Dreams', color: 0x271e3d, lightColor: 0xb794f4, bubbleColor: 0x9f7aea },
            { name: 'Warm Sunset', color: 0x3d1f0f, lightColor: 0xf6ad55, bubbleColor: 0xed8936 },
            { name: 'Aurora Borealis', color: 0x064e3b, lightColor: 0x34d399, bubbleColor: 0x10b981 },
            { name: 'Neon Cyber', color: 0x3b0764, lightColor: 0xf43f5e, bubbleColor: 0xec4899 }
          ];

          this.handleKeyDown = this.handleKeyDown.bind(this);
          this.handleKeyUp = this.handleKeyUp.bind(this);
        }

        addLabel(text, parent, offsetY = 1.0) {
          const label = new Text();
          label.text = text;
          label.fontSize = 0.15;
          label.color = 0xffffff;
          label.outlineWidth = 0.02;
          label.outlineColor = 0x000000;
          label.anchorX = 'center';
          label.anchorY = 'bottom';
          label.position.y = offsetY;
          label.sync();
          parent.add(label);
          this.tempLabels.push(label);
          return label;
        }

        async init() {
          if (xb.core.input.raycaster) {
            xb.core.input.raycaster.sortFunction = raycastSortFunction;
          }

          // Keyboard listeners for desktop locomotion
          window.addEventListener('keydown', this.handleKeyDown);
          window.addEventListener('keyup', this.handleKeyUp);

          this.ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
          this.add(this.ambientLight);

          this.directionalLight = new THREE.DirectionalLight(0x63b3ed, this.lightIntensity);
          this.directionalLight.position.set(0, 6, 3);
          this.directionalLight.castShadow = true;
          this.add(this.directionalLight);

          this.createRoomEnvironment();
          this.createSensoryBubbles();
          this.createWallSpotifyPlayer();
          this.createWallControlAndSwitches();
          this.createTaylorPoster();
          this.createSketchfabCouch();
          this.createOvalTableAndLavaLamp();

          // Set initial theme
          this.setTheme(0);
        }

        handleKeyDown(e) {
          if (e.key === 'w' || e.key === 'W') this.keys.w = true;
          if (e.key === 'a' || e.key === 'A') this.keys.a = true;
          if (e.key === 's' || e.key === 'S') this.keys.s = true;
          if (e.key === 'd' || e.key === 'D') this.keys.d = true;
        }

        handleKeyUp(e) {
          if (e.key === 'w' || e.key === 'W') this.keys.w = false;
          if (e.key === 'a' || e.key === 'A') this.keys.a = false;
          if (e.key === 's' || e.key === 'S') this.keys.s = false;
          if (e.key === 'd' || e.key === 'D') this.keys.d = false;
        }

        createRoomEnvironment() {
          // White walls to reflect lamp colors
          const wallMaterial = new THREE.MeshStandardMaterial({
            color: 0xf8fafc,
            roughness: 0.9,
            metalness: 0.05,
            side: THREE.BackSide
          });

          const roomGeo = new THREE.BoxGeometry(this.roomWidth, this.roomHeight, this.roomDepth);
          const roomMesh = new THREE.Mesh(roomGeo, wallMaterial);
          roomMesh.position.y = this.roomHeight / 2;
          this.roomMesh = roomMesh;
          this.add(roomMesh);

          // Plain dark floor to reduce visual noise
          const floorGeometry = new THREE.PlaneGeometry(this.roomWidth, this.roomDepth);
          const floorMaterial = new THREE.MeshStandardMaterial({
            color: 0x0f172a,
            roughness: 0.8,
            metalness: 0.1
          });
          const floor = new THREE.Mesh(floorGeometry, floorMaterial);
          floor.rotation.x = -Math.PI / 2;
          // Slight offset to prevent z-fighting flicker
          floor.position.y = 0.01;
          floor.receiveShadow = true;
          this.add(floor);

          // Modern Cylindrical Standing Floor Lamps
          const lampPoleGeo = new THREE.CylinderGeometry(0.03, 0.03, 3.2, 16);
          const lampMat = new THREE.MeshStandardMaterial({ color: 0x334155, metalness: 0.8, roughness: 0.2 });
          
          // Cylindrical open-ended shades
          const shadeGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.8, 32, 1, true);
          const shadeMat = new THREE.MeshStandardMaterial({ color: 0xffffff, side: THREE.DoubleSide, roughness: 0.4 });

          // Lamp 1 (Back Left)
          const lampGroup1 = new THREE.Group();
          const pole1 = new THREE.Mesh(lampPoleGeo, lampMat);
          pole1.position.y = 1.6;
          lampGroup1.add(pole1);
          const shade1 = new THREE.Mesh(shadeGeo, shadeMat);
          shade1.position.y = 2.8;
          lampGroup1.add(shade1);
          lampGroup1.position.set(-4.0, 0, 4.0);
          this.add(lampGroup1);
          this.movableObjects.push(lampGroup1);
          this.addLabel('Left Lamp', lampGroup1, 3.8);

          // Lamp 2 (Back Right)
          const lampGroup2 = new THREE.Group();
          const pole2 = new THREE.Mesh(lampPoleGeo, lampMat);
          pole2.position.y = 1.6;
          lampGroup2.add(pole2);
          const shade2 = new THREE.Mesh(shadeGeo, shadeMat);
          shade2.position.y = 2.8;
          lampGroup2.add(shade2);
          lampGroup2.position.set(4.0, 0, 4.0);
          this.add(lampGroup2);
          this.movableObjects.push(lampGroup2);
          this.addLabel('Right Lamp', lampGroup2, 3.8);

          // High intensity point lights to influence the white walls (Reduced influence by half)
          this.warmLight1 = new THREE.PointLight(0xfef08a, 2.0, 10);
          this.warmLight1.position.set(-4.0, 2.8, 4.0);
          this.warmLight1.castShadow = true;
          this.add(this.warmLight1);

          this.warmLight2 = new THREE.PointLight(0xfef08a, 2.0, 10);
          this.warmLight2.position.set(4.0, 2.8, 4.0);
          this.warmLight2.castShadow = true;
          this.add(this.warmLight2);

          this.lampLightList = [this.warmLight1, this.warmLight2];

          // Scenic Relaxing Window (Back wall center)
          const windowGeo = new THREE.PlaneGeometry(2.2, 2.6);
          const wCanvas = document.createElement('canvas');
          wCanvas.width = 1024;
          wCanvas.height = 1024;
          const viewCtx = wCanvas.getContext('2d');
          
          const grad = viewCtx.createLinearGradient(0, 0, 0, 1024);
          grad.addColorStop(0, '#3b82f6');
          grad.addColorStop(0.5, '#f43f5e');
          grad.addColorStop(1, '#f59e0b');
          viewCtx.fillStyle = grad;
          viewCtx.fillRect(0, 0, 1024, 1024);

          viewCtx.fillStyle = '#fef08a';
          viewCtx.beginPath();
          viewCtx.arc(512, 512, 120, 0, Math.PI * 2);
          viewCtx.fill();

          viewCtx.fillStyle = '#0f172a';
          viewCtx.beginPath();
          viewCtx.moveTo(0, 1024);
          viewCtx.lineTo(0, 700);
          viewCtx.lineTo(300, 500);
          viewCtx.lineTo(600, 650);
          viewCtx.lineTo(1024, 450);
          viewCtx.lineTo(1024, 1024);
          viewCtx.fill();

          const windowTexture = new THREE.CanvasTexture(wCanvas);
          const windowMat = new THREE.MeshBasicMaterial({ map: windowTexture });
          const windowMesh = new THREE.Mesh(windowGeo, windowMat);
          // Moved to right side of front wall
          windowMesh.position.set(2.5, 2.2, -4.95);
          this.add(windowMesh);

          const frameGeo = new THREE.BoxGeometry(2.4, 2.8, 0.1);
          const frameMat = new THREE.MeshStandardMaterial({ color: '#1e293b', roughness: 0.4 });
          const frameMesh = new THREE.Mesh(frameGeo, frameMat);
          frameMesh.position.set(2.5, 2.2, -4.95);
          this.add(frameMesh);
          this.addLabel('Scenic Window', frameMesh, 1.6);
        }

        async createSketchfabCouch() {
          // Fallback Couch
          this.couchGroup = new THREE.Group();
          const fabricMat = new THREE.MeshStandardMaterial({ color: 0x3b82f6, roughness: 0.7 });
          
          const seatGeo = new THREE.BoxGeometry(1.6, 0.35, 0.8);
          const seat = new THREE.Mesh(seatGeo, fabricMat);
          seat.position.y = 0.35;
          seat.castShadow = true;
          seat.receiveShadow = true;
          this.couchGroup.add(seat);

          const backGeo = new THREE.BoxGeometry(1.6, 0.8, 0.25);
          const back = new THREE.Mesh(backGeo, fabricMat);
          back.position.set(0, 0.75, -0.3);
          back.castShadow = true;
          this.couchGroup.add(back);

          const armGeo = new THREE.BoxGeometry(0.25, 0.6, 0.85);
          const leftArm = new THREE.Mesh(armGeo, fabricMat);
          leftArm.position.set(-0.9, 0.5, 0);
          leftArm.castShadow = true;
          this.couchGroup.add(leftArm);

          const rightArm = new THREE.Mesh(armGeo, fabricMat);
          rightArm.position.set(0.9, 0.5, 0);
          rightArm.castShadow = true;
          this.couchGroup.add(rightArm);

          // Position against the back wall, facing forward
          this.couchGroup.position.set(0, 0.01, 3.5);
          this.couchGroup.rotation.y = Math.PI; // Face front
          
          // Make interactive
          this.add(this.couchGroup);
          this.movableObjects.push(this.couchGroup);
          this.couchLabel = this.addLabel('Sofa / Couch', this.couchGroup, 1.2);

          // Try loading user's custom GLB
          try {
            const sofa = new xb.ModelViewer({});
            await sofa.loadGLTFModel({
              data: {
                path: 'https://cdn.jsdelivr.net/gh/aine100/vr-sensory-room@main/',
                model: 'sofa.glb',
                scale: { x: 1.0, y: 1.0, z: 1.0 },
                rotation: { x: 0, y: 0, z: 0 }
              },
              renderer: xb.core.renderer,
            });

            // Automatically calculate size and adjust it to exactly 1.7 meters wide (Increased size slightly)
            const box = new THREE.Box3().setFromObject(sofa);
            const size = box.getSize(new THREE.Vector3());
            const targetWidth = 1.7;
            if (size.x > 0) {
              const scaleFactor = targetWidth / size.x;
              sofa.scale.setScalar(scaleFactor);
            }

            // Recalculate box after scaling to find exact floor center
            const newBox = new THREE.Box3().setFromObject(sofa);
            const center = newBox.getCenter(new THREE.Vector3());
            
            // Center it on X and Z, place lowest point on floor
            sofa.position.sub(center); 
            sofa.position.y += (sofa.position.y - newBox.min.y) + 0.01;
            
            // Move into position
            const finalCouchGroup = new THREE.Group();
            finalCouchGroup.add(sofa);
            finalCouchGroup.position.set(0, 0, 3.5);
            finalCouchGroup.rotation.y = Math.PI; // face front

            // Swap fallback with real model
            this.remove(this.couchGroup);
            this.movableObjects = this.movableObjects.filter(obj => obj !== this.couchGroup);
            
            this.couchGroup = finalCouchGroup;
            this.add(this.couchGroup);
            this.movableObjects.push(this.couchGroup);
            this.couchGroup.add(this.couchLabel); // Transfer label to the custom 3D model
            
            console.log('Custom Sketchfab sofa loaded, scaled, and grounded!');
          } catch (e) {
            console.warn('Using built-in cozy sofa model.');
          }
        }

        createOvalTableAndLavaLamp() {
          this.tableGroup = new THREE.Group();
          
          // Oval Top
          const tableTopGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.05, 32);
          tableTopGeo.scale(1.8, 1.0, 1.0); // Scale X to create a smooth oval shape
          const tableMat = new THREE.MeshStandardMaterial({ color: 0x475569, roughness: 0.6, metalness: 0.2 });
          const tableTop = new THREE.Mesh(tableTopGeo, tableMat);
          tableTop.position.y = 0.45;
          tableTop.castShadow = true;
          tableTop.receiveShadow = true;
          this.tableGroup.add(tableTop);

          // Table Legs
          const legGeo = new THREE.CylinderGeometry(0.03, 0.02, 0.45, 16);
          const legMat = new THREE.MeshStandardMaterial({ color: 0x1e293b, metalness: 0.8, roughness: 0.2 });
          
          const legPositions = [
            [-0.7, 0.225, -0.3], [0.7, 0.225, -0.3],
            [-0.7, 0.225, 0.3], [0.7, 0.225, 0.3]
          ];

          legPositions.forEach(pos => {
            const leg = new THREE.Mesh(legGeo, legMat);
            leg.position.set(...pos);
            leg.castShadow = true;
            this.tableGroup.add(leg);
          });

          // Move Table in front of the couch
          this.tableGroup.position.set(0, 0.01, 1.5);
          this.add(this.tableGroup);
          this.movableObjects.push(this.tableGroup);
          this.addLabel('Oval Coffee Table', this.tableGroup, 0.6);

          // Lava Lamp
          this.lavaGroup = new THREE.Group();
          const baseGeo = new THREE.CylinderGeometry(0.06, 0.08, 0.15, 16);
          const baseMat = new THREE.MeshStandardMaterial({ color: 0x94a3b8, metalness: 0.9, roughness: 0.2 });
          const base = new THREE.Mesh(baseGeo, baseMat);
          base.position.y = 0.075;
          this.lavaGroup.add(base);

          const glassGeo = new THREE.CylinderGeometry(0.04, 0.06, 0.3, 16);
          const glassMat = new THREE.MeshPhysicalMaterial({ 
            color: 0xffffff, transmission: 0.9, opacity: 1, transparent: true, roughness: 0.1, ior: 1.5 
          });
          const glass = new THREE.Mesh(glassGeo, glassMat);
          glass.position.y = 0.3;
          this.lavaGroup.add(glass);

          const topGeo = new THREE.ConeGeometry(0.04, 0.1, 16);
          const topMesh = new THREE.Mesh(topGeo, baseMat);
          topMesh.position.y = 0.5;
          this.lavaGroup.add(topMesh);

          // Lava blobs
          this.lavaBlobs = [];
          this.lavaMat = new THREE.MeshStandardMaterial({ color: 0x4299e1, emissive: 0x4299e1, emissiveIntensity: 0.8, roughness: 0.2 });
          const blobGeo = new THREE.SphereGeometry(0.03, 16, 16);
          for(let i=0; i<3; i++) {
            const blob = new THREE.Mesh(blobGeo, this.lavaMat);
            blob.userData = { 
              speed: 0.5 + Math.random() * 0.5, 
              offset: Math.random() * Math.PI * 2,
              heightScale: 0.1 + Math.random() * 0.05
            };
            this.lavaGroup.add(blob);
            this.lavaBlobs.push(blob);
          }

          this.lavaLight = new THREE.PointLight(0x4299e1, 1.5, 3);
          this.lavaLight.position.y = 0.3;
          this.lavaGroup.add(this.lavaLight);
          this.lampLightList.push(this.lavaLight);

          // Sit lava lamp on the table
          this.lavaGroup.position.set(0.6, 0.475, 0); 
          this.tableGroup.add(this.lavaGroup);
          this.addLabel('Lava Lamp', this.lavaGroup, 0.7);
        }

        createWallSpotifyPlayer() {
          const tvGroup = new THREE.Group();

          const caseGeo = new THREE.BoxGeometry(2.5, 1.4, 0.08);
          const caseMat = new THREE.MeshStandardMaterial({ color: 0x0f172a, roughness: 0.3, metalness: 0.8 });
          const tvCase = new THREE.Mesh(caseGeo, caseMat);
          tvCase.castShadow = true;
          tvGroup.add(tvCase);

          const screenGeo = new THREE.PlaneGeometry(2.4, 1.3);
          const canvas = document.createElement('canvas');
          canvas.width = 1280;
          canvas.height = 720;
          const ctx = canvas.getContext('2d');
          this.tvCanvas = canvas;
          this.tvCtx = ctx;

          this.updateTvDisplay('Weightless (Calming Ambient)', 'Marconi Union', false);

          const texture = new THREE.CanvasTexture(canvas);
          this.tvTexture = texture;
          const screenMat = new THREE.MeshBasicMaterial({ map: texture });
          const screenMesh = new THREE.Mesh(screenGeo, screenMat);
          screenMesh.position.z = 0.042;
          tvGroup.add(screenMesh);

          // Centered on the front wall
          tvGroup.position.set(0, 2.2, -4.95);
          this.add(tvGroup);
          this.addLabel('Spotify TV', tvGroup, 0.8);
        }

        updateTvDisplay(trackTitle, artist, isTaylorPlaylist) {
          const ctx = this.tvCtx;
          ctx.fillStyle = '#121212';
          ctx.fillRect(0, 0, 1280, 720);

          ctx.fillStyle = '#1db954';
          ctx.font = 'bold 48px Inter, sans-serif';
          ctx.fillText(isTaylorPlaylist ? 'Spotify • Taylor Swift Playlist' : 'Spotify Connected TV', 80, 100);

          ctx.fillStyle = isTaylorPlaylist ? '#f43f5e' : '#282828';
          ctx.fillRect(80, 150, 220, 220);
          ctx.fillStyle = '#ffffff';
          ctx.font = 'bold 72px Inter, sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(isTaylorPlaylist ? '★' : '♫', 190, 290);
          ctx.textAlign = 'left';

          ctx.fillStyle = '#ffffff';
          ctx.font = 'bold 48px Inter, sans-serif';
          ctx.fillText(trackTitle, 340, 230);

          ctx.fillStyle = '#b3b3b3';
          ctx.font = '36px Inter, sans-serif';
          ctx.fillText(artist, 340, 290);

          ctx.fillStyle = '#535353';
          ctx.fillRect(80, 460, 1120, 16);
          ctx.fillStyle = '#1db954';
          ctx.fillRect(80, 460, isTaylorPlaylist ? 840 : 480, 16);

          ctx.fillStyle = '#a7a7a7';
          ctx.font = '28px Inter, sans-serif';
          ctx.fillText('3:45', 80, 520);
          ctx.fillText('4:15', 1130, 520);

          ctx.fillStyle = '#ffffff';
          ctx.font = '44px Inter, sans-serif';
          ctx.fillText('⏮       ▶ (Playing)       ⏭       🔊', 400, 630);

          if (this.tvTexture) {
            this.tvTexture.needsUpdate = true;
          }
        }

        createWallControlAndSwitches() {
          const switchGeo = new THREE.PlaneGeometry(0.6, 0.8);
          
          const createHighResBtn = (text, bgColor, iconColor, sizeX = 512, sizeY = 512) => {
            const c = document.createElement('canvas');
            c.width = sizeX;
            c.height = sizeY;
            const ctx = c.getContext('2d');
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, sizeX, sizeY);
            ctx.fillStyle = iconColor;
            ctx.beginPath();
            ctx.arc(sizeX/2, sizeY*0.4, sizeX*0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 40px Inter, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(text, sizeX/2, sizeY*0.8);
            return new THREE.CanvasTexture(c);
          };

          // Buttons configured for the left wall
          const btnData = [
            { id: 'toggle_bubbles', text: '🫧 BUBBLES', color: '#10b981', z: 1.5 },
            { id: 'speed', text: '🫧 SPEED', color: '#38bdf8', z: 0.75 },
            { id: 'toggle_lamps', text: '💡 LAMPS', color: '#fbbf24', z: 0.0 },
            { id: 'light', text: '💡 BRIGHT', color: '#f59e0b', z: -0.75 },
            { id: 'theme', text: '🎨 THEME', color: '#a855f7', z: -1.5 },
          ];

          btnData.forEach(btn => {
            const tex = createHighResBtn(btn.text, '#1e293b', btn.color);
            const mat = new THREE.MeshStandardMaterial({ map: tex, roughness: 0.2 });
            const mesh = new THREE.Mesh(switchGeo, mat);
            // Placed on left wall
            mesh.position.set(-4.95, 2.4, btn.z);
            mesh.rotation.y = Math.PI / 2;
            mesh.userData = { action: btn.id };
            this.add(mesh);
          });

          // Transparent Theme Panel below switches
          const themePanelGeo = new THREE.PlaneGeometry(3.6, 0.8);
          const tCanvas = document.createElement('canvas');
          tCanvas.width = 1536;
          tCanvas.height = 384;
          const tCtx = tCanvas.getContext('2d');
          
          tCtx.clearRect(0, 0, 1536, 384);

          for(let i=0; i<6; i++) {
            const x = 24 + i * 252;
            tCtx.fillStyle = this.themes[i].color === 0x142850 ? '#63b3ed' : 
                             this.themes[i].color === 0x123524 ? '#68d391' : 
                             this.themes[i].color === 0x271e3d ? '#b794f4' : 
                             this.themes[i].color === 0x3d1f0f ? '#f6ad55' : 
                             this.themes[i].color === 0x064e3b ? '#34d399' : '#f43f5e';
            tCtx.beginPath();
            tCtx.roundRect(x, 48, 224, 288, 48);
            tCtx.fill();

            tCtx.fillStyle = '#ffffff';
            tCtx.font = 'bold 40px Inter, sans-serif';
            tCtx.textAlign = 'center';
            tCtx.fillText(this.themes[i].name.split(' ')[0], x + 112, 210);
          }

          const tTexture = new THREE.CanvasTexture(tCanvas);
          const tMat = new THREE.MeshStandardMaterial({ map: tTexture, transparent: true, roughness: 0.3 });
          const tMesh = new THREE.Mesh(themePanelGeo, tMat);
          tMesh.position.set(-4.95, 1.4, 0.0);
          tMesh.rotation.y = Math.PI / 2;
          tMesh.userData = { action: 'theme_panel' };
          this.add(tMesh);
          this.addLabel('Theme Controls', tMesh, 0.5);
        }

        createTaylorPoster() {
          const posterGeo = new THREE.PlaneGeometry(1.5, 2.1);
          const posterMat = new THREE.MeshStandardMaterial({ roughness: 0.2 });
          const posterMesh = new THREE.Mesh(posterGeo, posterMat);
          
          // Positioned on the right wall
          posterMesh.position.set(4.95, 2.2, 0.0);
          posterMesh.rotation.y = -Math.PI / 2;
          this.taylorPosterMesh = posterMesh;
          this.add(posterMesh);
          this.addLabel('Taylor Poster', posterMesh, 1.2);

          const textureLoader = new THREE.TextureLoader();
          textureLoader.load(
            'https://cdn.jsdelivr.net/gh/aine100/vr-sensory-room@main/taylor_poster.png',
            (tex) => { posterMat.map = tex; posterMat.needsUpdate = true; },
            undefined,
            () => {
              const fCanvas = document.createElement('canvas');
              fCanvas.width = 600; fCanvas.height = 840;
              const fCtx = fCanvas.getContext('2d');
              fCtx.fillStyle = '#ffffff'; fCtx.fillRect(0, 0, 600, 840);
              fCtx.fillStyle = '#0f172a'; fCtx.fillRect(20, 20, 560, 560);
              fCtx.fillStyle = '#fce7f3';
              fCtx.font = 'bold 40px Inter, sans-serif';
              fCtx.textAlign = 'center';
              fCtx.fillText('TAYLOR SWIFT', 300, 290);
              fCtx.font = 'bold 28px Inter, sans-serif';
              fCtx.fillText('THE ERAS TOUR', 300, 340);
              posterMat.map = new THREE.CanvasTexture(fCanvas);
              posterMat.needsUpdate = true;
            }
          );
        }

        createSensoryBubbles() {
          const particleCount = 60; // Reduced for organic feel
          const geometry = new THREE.SphereGeometry(1.0, 16, 16); // Base size 1, scaled per instance
          const material = new THREE.MeshStandardMaterial({
            color: 0xffffff,
            transparent: true,
            opacity: 0.8,
            roughness: 0.1,
            metalness: 0.3
          });

          this.bubbleParticles = new THREE.InstancedMesh(geometry, material, particleCount);
          const dummy = new THREE.Object3D();
          this.bubbleData = [];
          this.bubbleColors = new Float32Array(particleCount * 3);

          // Rejection sampling for anti-clumping
          const positions = [];
          for (let i = 0; i < particleCount; i++) {
            let x, y, z, valid;
            let attempts = 0;
            do {
              x = (Math.random() - 0.5) * 8;
              y = 0.5 + Math.random() * 3.0;
              z = (Math.random() - 0.5) * 8;
              valid = true;
              for(const p of positions) {
                if (p.distanceTo(new THREE.Vector3(x,y,z)) < 0.7) { valid = false; break; }
              }
              attempts++;
            } while(!valid && attempts < 50);
            
            positions.push(new THREE.Vector3(x,y,z));
            
            // Random scales between 0.03 and 0.12
            const scale = 0.03 + Math.random() * 0.09;
            dummy.position.set(x, y, z);
            dummy.scale.set(scale, scale, scale);
            dummy.updateMatrix();
            this.bubbleParticles.setMatrixAt(i, dummy.matrix);

            this.bubbleData.push({
              x: x, y: y, z: z,
              scale: scale,
              baseSpeed: 0.002 + Math.random() * 0.003,
              wobbleSpeed: 1 + Math.random() * 3,
              wobbleAmount: 0.02 + Math.random() * 0.03,
              vx: 0, vy: 0, vz: 0
            });
          }

          this.bubbleParticles.instanceColor = new THREE.InstancedBufferAttribute(this.bubbleColors, 3);
          this.bubbleParticles.instanceMatrix.needsUpdate = true;
          this.add(this.bubbleParticles);

          // Add a central label for the bubble field
          const bubbleCenter = new THREE.Group();
          bubbleCenter.position.set(0, 3.5, 0);
          this.add(bubbleCenter);
          this.addLabel('Sensory Bubbles', bubbleCenter, 0);
        }

        toggleBubbles() {
          this.bubblesActive = !this.bubblesActive;
          if (this.bubbleParticles) this.bubbleParticles.visible = this.bubblesActive;
        }

        toggleLamps() {
          this.lampsActive = !this.lampsActive;
          this.lampLightList.forEach(light => {
            if(light) light.visible = this.lampsActive;
          });
        }

        setTheme(index) {
          this.currentThemeIndex = index;
          const theme = this.themes[index];
          this.roomMesh.material.color.setHex(theme.color);
          this.directionalLight.color.setHex(theme.lightColor);
          
          // Update lamp lights to match theme tightly
          if (this.warmLight1) this.warmLight1.color.setHex(theme.lightColor);
          if (this.warmLight2) this.warmLight2.color.setHex(theme.lightColor);
          if (this.lavaLight) this.lavaLight.color.setHex(theme.bubbleColor);
          if (this.lavaMat) this.lavaMat.color.setHex(theme.bubbleColor);
          if (this.lavaMat) this.lavaMat.emissive.setHex(theme.bubbleColor);

          // Update bubble hues organically based on theme
          if (this.bubbleParticles) {
            const baseColor = new THREE.Color(theme.bubbleColor);
            const hsl = { h: 0, s: 0, l: 0 };
            baseColor.getHSL(hsl);
            
            const tmpColor = new THREE.Color();
            for(let i=0; i < this.bubbleData.length; i++) {
              const hOffset = (Math.random() - 0.5) * 0.15; // Shift hue slightly
              const lOffset = (Math.random() - 0.5) * 0.2;  // Shift lightness
              tmpColor.setHSL(
                (hsl.h + hOffset + 1.0) % 1.0, 
                Math.min(1, Math.max(0, hsl.s)), 
                Math.min(1, Math.max(0.2, hsl.l + lOffset))
              );
              this.bubbleColors[i*3] = tmpColor.r;
              this.bubbleColors[i*3+1] = tmpColor.g;
              this.bubbleColors[i*3+2] = tmpColor.b;
            }
            this.bubbleParticles.instanceColor.needsUpdate = true;
          }
        }

        cycleTheme() {
          this.setTheme((this.currentThemeIndex + 1) % this.themes.length);
        }

        cycleBubbleSpeed() {
          this.bubbleSpeedMultiplier = this.bubbleSpeedMultiplier === 1.0 ? 0.5 : 
                                       this.bubbleSpeedMultiplier === 0.5 ? 2.0 : 1.0;
        }

        cycleLightIntensity() {
          this.lightIntensity = this.lightIntensity === 2.0 ? 1.0 : 
                                this.lightIntensity === 1.0 ? 3.0 : 2.0;
          this.directionalLight.intensity = this.lightIntensity;
        }

        onSelectStart(event) {
          const controller = event.target;
          
          // 1. Check UI Switches
          const switches = this.children.filter(c => c.userData && c.userData.action);
          for (const sw of switches) {
            const intersection = xb.core.user.select(sw, controller);
            if (intersection) {
              if (sw.userData.action === 'toggle_bubbles') this.toggleBubbles();
              if (sw.userData.action === 'speed') this.cycleBubbleSpeed();
              if (sw.userData.action === 'toggle_lamps') this.toggleLamps();
              if (sw.userData.action === 'light') this.cycleLightIntensity();
              if (sw.userData.action === 'theme') this.cycleTheme();
              if (sw.userData.action === 'theme_panel' && intersection.uv) {
                const idx = Math.min(5, Math.floor(intersection.uv.x * 6));
                this.setTheme(idx);
              }
              return; // Handled UI
            }
          }

          // 2. Check Movable Furniture
          for(const obj of this.movableObjects) {
             const hit = xb.core.user.select(obj, controller);
             if (hit) {
               this.grabbedObject = obj;
               this.grabController = controller;
               
               // Calculate offset from controller ray to object origin
               const ray = new THREE.Ray();
               const mat = new THREE.Matrix4().identity().extractRotation(controller.matrixWorld);
               ray.origin.setFromMatrixPosition(controller.matrixWorld);
               ray.direction.set(0, 0, -1).applyMatrix4(mat);
               
               // Approximate distance
               const dist = ray.origin.distanceTo(obj.position);
               const grabPoint = ray.origin.clone().add(ray.direction.multiplyScalar(dist));
               
               this.grabOffset.copy(obj.position).sub(grabPoint);
               return;
             }
          }
        }

        onSelecting(event) {
          if (this.grabbedObject && this.grabController === event.target) {
             const ray = new THREE.Ray();
             const mat = new THREE.Matrix4().identity().extractRotation(this.grabController.matrixWorld);
             ray.origin.setFromMatrixPosition(this.grabController.matrixWorld);
             ray.direction.set(0, 0, -1).applyMatrix4(mat);
             
             // Keep object at rough ground level while dragging
             const floorPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -0.01);
             const intersectPoint = new THREE.Vector3();
             
             // Cast ray downward slightly to hit floor, or just project distance
             ray.intersectPlane(floorPlane, intersectPoint);
             
             if (intersectPoint) {
                // Keep the Y locked to initial so it slides!
                const origY = this.grabbedObject.position.y;
                this.grabbedObject.position.copy(intersectPoint).add(this.grabOffset);
                this.grabbedObject.position.y = origY;
             }
          }
        }

        onSelectEnd(event) {
          if (this.grabController === event.target) {
            this.grabbedObject = null;
            this.grabController = null;
          }
        }

        update() {
          const time = performance.now() * 0.001;
          const dt = xb.getDeltaTime() || 0.016;

          // Billboarding: Make all temporary labels face the user's camera
          if (xb.core.camera && this.tempLabels) {
            const camPos = xb.core.camera.position;
            for (const label of this.tempLabels) {
              label.lookAt(camPos);
            }
          }

          // Process Locomotion (Desktop Keyboard + VR Thumbsticks)
          this.moveVelocity.set(0,0,0);
          const speed = 2.0 * dt;

          if (this.keys.w) this.moveVelocity.z -= speed;
          if (this.keys.s) this.moveVelocity.z += speed;
          if (this.keys.a) this.moveVelocity.x -= speed;
          if (this.keys.d) this.moveVelocity.x += speed;

          const session = xb.core.renderer.xr.getSession();
          if (session) {
             for (const source of session.inputSources) {
                 if (source.gamepad && source.gamepad.axes.length >= 4) {
                     // Deadzone check
                     if (Math.abs(source.gamepad.axes[2]) > 0.1) this.moveVelocity.x += source.gamepad.axes[2] * speed;
                     if (Math.abs(source.gamepad.axes[3]) > 0.1) this.moveVelocity.z += source.gamepad.axes[3] * speed;
                 }
             }
          }

          // Apply Locomotion & Bounding Box Collision
          if (this.moveVelocity.lengthSq() > 0) {
             const userRig = xb.core.camera; 
             // Determine proposed new position
             const proposedPos = userRig.position.clone().add(this.moveVelocity);
             
             // Build player bounding box (approximate)
             const playerBox = new THREE.Box3();
             playerBox.min.set(proposedPos.x - 0.3, 0, proposedPos.z - 0.3);
             playerBox.max.set(proposedPos.x + 0.3, 2.0, proposedPos.z + 0.3);

             let collision = false;
             
             // 1. Room bounds collision
             if (proposedPos.x < -4.5 || proposedPos.x > 4.5 || proposedPos.z < -4.5 || proposedPos.z > 4.5) {
                collision = true;
             }

             // 2. Furniture bounds collision
             if (!collision) {
               for(const obj of this.movableObjects) {
                 const objBox = new THREE.Box3().setFromObject(obj);
                 if (playerBox.intersectsBox(objBox)) {
                   collision = true;
                   break;
                 }
               }
             }

             // In a single-file custom rig, modifying the group holding the room
             // creates the illusion of movement without breaking WebXR.
             // We move the entire room oppositely!
             if (!collision) {
               this.position.sub(this.moveVelocity);
             }
          }

          // Animate Lava Lamp
          if (this.lavaBlobs && this.lampsActive) {
            this.lavaBlobs.forEach((blob) => {
              const d = blob.userData;
              blob.position.y = 0.2 + Math.sin(time * d.speed + d.offset) * 0.15;
              blob.scale.y = 1.0 + Math.sin(time * d.speed * 2.0 + d.offset) * d.heightScale;
            });
          }

          // Animate Bubbles
          if (this.bubbleParticles && this.bubbleData && this.bubblesActive) {
            const dummy = new THREE.Object3D();
            
            for (let i = 0; i < this.bubbleData.length; i++) {
              const data = this.bubbleData[i];
              data.y += (data.baseSpeed + data.vy) * this.bubbleSpeedMultiplier;
              if (data.y > 3.8) data.y = 0;

              data.x += data.vx;
              data.z += data.vz;
              data.vx *= 0.92;
              data.vy *= 0.92;
              data.vz *= 0.92;

              const wobbleX = data.x + Math.sin(time * data.wobbleSpeed + i) * data.wobbleAmount;
              const wobbleZ = data.z + Math.cos(time * data.wobbleSpeed + i) * data.wobbleAmount;

              dummy.position.set(wobbleX, data.y, wobbleZ);
              dummy.scale.set(data.scale, data.scale, data.scale);
              dummy.updateMatrix();
              this.bubbleParticles.setMatrixAt(i, dummy.matrix);
            }
            this.bubbleParticles.instanceMatrix.needsUpdate = true;
          }

          // Taylor Swift Proximity Trigger (Right Wall x = 4.95)
          if (xb.core.camera) {
            // Because we move the room via `this.position`, we must check relative distance
            const camLocalPos = xb.core.camera.position.clone().sub(this.position);
            const posterPos = new THREE.Vector3(4.95, 2.2, 0.0);
            const dist = camLocalPos.distanceTo(posterPos);
            
            if (dist < 2.5 && !this._taylorPlaying) {
              this._taylorPlaying = true;
              this.updateTvDisplay('Anti-Hero (The Eras Tour Live)', 'Taylor Swift • Pop Anthems', true);
            } else if (dist >= 2.5 && this._taylorPlaying) {
              this._taylorPlaying = false;
              this.updateTvDisplay('Weightless (Calming Ambient)', 'Marconi Union • Autism Sensory Relax', false);
            }
          }
        }
      }

      document.addEventListener('DOMContentLoaded', () => {
        const options = new xb.Options();
        options.enableUI();
        options.uikit.enable(uikit);
        options.setAppTitle('VR Sensory Room');
        xb.add(new SensoryRoomScript());
        xb.init(options);
      });
    </script>
  </body>

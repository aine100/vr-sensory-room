<!doctype html>
<html lang="en">
  <head>
    <title>VR Sensory Room for Teenagers with Autism</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <link type="text/css" rel="stylesheet" href="https://xrblocks.github.io/css/xr.css" />
    <script>
      window.litDisableBundleWarning = true;
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
          "three/": "https://cdn.jsdelivr.net/npm/three@0.184.0/",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/",
          "troika-three-text": "https://cdn.jsdelivr.net/gh/protectwise/troika@028b81cf308f0f22e5aa8e78196be56ec1997af5/packages/troika-three-text/src/index.js",
          "troika-three-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-three-utils/src/index.js",
          "troika-worker-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-worker-utils/src/index.js",
          "bidi-js": "https://esm.sh/bidi-js@%5E1.0.2?target=es2022",
          "webgl-sdf-generator": "https://esm.sh/webgl-sdf-generator@1.1.1/es2022/webgl-sdf-generator.mjs",
          "@pmndrs/uikit": "https://cdn.jsdelivr.net/npm/@pmndrs/uikit@1.0.56/dist/index.min.js",
          "@pmndrs/uikit-pub-sub": "https://cdn.jsdelivr.net/npm/@pmndrs/uikit-pub-sub@1.0.56/dist/index.min.js",
          "@pmndrs/msdfonts": "https://cdn.jsdelivr.net/npm/@pmndrs/msdfonts@1.0.56/dist/index.min.js",
          "@preact/signals-core": "https://cdn.jsdelivr.net/npm/@preact/signals-core@1.12.1/dist/signals-core.mjs",
          "yoga-layout/load": "https://cdn.jsdelivr.net/npm/yoga-layout@3.2.1/dist/src/load.js",
          "uiblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.16.0/build/addons/uiblocks/src/index.js",
          "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.16.0/build/xrblocks.js"
        }
      }
    </script>
  </head>
  <body>
    <script type="module">
      import * as uikit from '@pmndrs/uikit';
      import * as THREE from 'three';
      import { Text } from 'troika-three-text';
      import { raycastSortFunction } from 'uiblocks';
      import * as xb from 'xrblocks';

      class SensoryRoomScript extends xb.Script {
        constructor() {
          super();
          this.ambientLight = null;
          this.directionalLight = null;
          
          this.currentThemeIndex = 0;
          this.bubbleSpeedMultiplier = 1.0;
          this.lightIntensity = 1.0;
          this.bubblesActive = true;
          this.lampsActive = true;

          this.movableObjects = [];
          this.grabbedObject = null;
          this.grabController = null;
          this.raycaster = new THREE.Raycaster();
          this.mouse = new THREE.Vector2();

          this.roomWidth = 10;
          this.roomHeight = 4;
          this.roomDepth = 10;

          this.keys = { w: false, a: false, s: false, d: false, q: false, e: false, arrowLeft: false, arrowRight: false };

          this.audioCtx = null;
          this.isPlayingAudio = false;

          this.themes = [
            { name: 'Ocean Calm', color: 0x142850, lightColor: 0x63b3ed, bubbleColor: 0x4299e1 },
            { name: 'Forest Serenity', color: 0x123524, lightColor: 0x68d391, bubbleColor: 0x48bb78 },
            { name: 'Lavender Dreams', color: 0x271e3d, lightColor: 0xb794f4, bubbleColor: 0x9f7aea },
            { name: 'Warm Sunset', color: 0x3d1f0f, lightColor: 0xf6ad55, bubbleColor: 0xed8936 },
            { name: 'Aurora Borealis', color: 0x064e3b, lightColor: 0x34d399, bubbleColor: 0x10b981 },
            { name: 'Neon Cyber', color: 0x3b0764, lightColor: 0xf43f5e, bubbleColor: 0xec4899 }
          ];

          this.handleKeyDown = this.handleKeyDown.bind(this);
          this.handleKeyUp = this.handleKeyUp.bind(this);
          this.handlePointerDown = this.handlePointerDown.bind(this);
          this.handlePointerUp = this.handlePointerUp.bind(this);
        }

        async init() {
          if (xb.core.input.raycaster) {
            xb.core.input.raycaster.sortFunction = raycastSortFunction;
          }

          window.addEventListener('keydown', this.handleKeyDown);
          window.addEventListener('keyup', this.handleKeyUp);
          window.addEventListener('pointerdown', this.handlePointerDown);
          window.addEventListener('pointerup', this.handlePointerUp);

          this.ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
          this.add(this.ambientLight);

          this.directionalLight = new THREE.DirectionalLight(0x63b3ed, 1.8);
          this.directionalLight.position.set(0, 6, 3);
          this.directionalLight.castShadow = true;
          this.add(this.directionalLight);

          this.createRoomEnvironment();
          this.createSensoryBubbles();
          this.createWallSpotifyPlayer();
          this.createWallControlAndSwitches();
          this.createOvalTableAndLavaLamp();

          this.setTheme(0);
        }

        handleKeyDown(e) {
          if (e.key === 'w' || e.key === 'W') this.keys.w = true;
          if (e.key === 'a' || e.key === 'A') this.keys.a = true;
          if (e.key === 's' || e.key === 'S') this.keys.s = true;
          if (e.key === 'd' || e.key === 'D') this.keys.d = true;
          if (e.key === 'q' || e.key === 'Q') this.keys.q = true;
          if (e.key === 'e' || e.key === 'E') this.keys.e = true;
          if (e.key === 'ArrowLeft') this.keys.arrowLeft = true;
          if (e.key === 'ArrowRight') this.keys.arrowRight = true;
        }

        handleKeyUp(e) {
          if (e.key === 'w' || e.key === 'W') this.keys.w = false;
          if (e.key === 'a' || e.key === 'A') this.keys.a = false;
          if (e.key === 's' || e.key === 'S') this.keys.s = false;
          if (e.key === 'd' || e.key === 'D') this.keys.d = false;
          if (e.key === 'q' || e.key === 'Q') this.keys.q = false;
          if (e.key === 'e' || e.key === 'E') this.keys.e = false;
          if (e.key === 'ArrowLeft') this.keys.arrowLeft = false;
          if (e.key === 'ArrowRight') this.keys.arrowRight = false;
        }

        handlePointerDown(e) {
          this.mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
          this.mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
          this.raycaster.setFromCamera(this.mouse, xb.core.camera);
          
          const intersects = this.raycaster.intersectObjects(this.movableObjects, true);
          if (intersects.length > 0) {
            let obj = intersects[0].object;
            while (obj.parent && !this.movableObjects.includes(obj)) {
              obj = obj.parent;
            }
            if (this.movableObjects.includes(obj)) {
              this.grabbedObject = obj;
              this.grabController = 'desktop';
            }
          }
        }

        handlePointerUp(e) {
          if (this.grabbedObject && this.grabController === 'desktop') {
            this.grabbedObject = null;
            this.grabController = null;
          }
        }

        createRoomEnvironment() {
          const wallMaterial = new THREE.MeshStandardMaterial({
            color: 0xf8fafc,
            roughness: 0.9,
            metalness: 0.05,
            side: THREE.BackSide
          });

          const roomGeo = new THREE.BoxGeometry(this.roomWidth, this.roomHeight, this.roomDepth);
          const roomMesh = new THREE.Mesh(roomGeo, wallMaterial);
          roomMesh.position.y = this.roomHeight / 2;
          this.roomMesh = roomMesh;
          this.add(roomMesh);

          const floorGeometry = new THREE.PlaneGeometry(this.roomWidth, this.roomDepth);
          const floorMaterial = new THREE.MeshStandardMaterial({
            color: 0x0f172a,
            roughness: 0.8,
            metalness: 0.1
          });
          const floor = new THREE.Mesh(floorGeometry, floorMaterial);
          floor.rotation.x = -Math.PI / 2;
          floor.position.y = 0.01;
          floor.receiveShadow = true;
          this.add(floor);

          const lampPoleGeo = new THREE.CylinderGeometry(0.03, 0.03, 3.2, 16);
          const lampMat = new THREE.MeshStandardMaterial({ color: 0x334155, metalness: 0.8, roughness: 0.2 });
          const shadeGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.8, 32, 1, true);
          const shadeMat = new THREE.MeshStandardMaterial({ color: 0xffffff, side: THREE.DoubleSide, roughness: 0.4 });

          const lampGroup1 = new THREE.Group();
          const pole1 = new THREE.Mesh(lampPoleGeo, lampMat);
          pole1.position.y = 1.6;
          lampGroup1.add(pole1);
          const shade1 = new THREE.Mesh(shadeGeo, shadeMat);
          shade1.position.y = 2.8;
          lampGroup1.add(shade1);
          lampGroup1.position.set(-4.0, 0, 4.0);
          lampGroup1.userData = { name: "Standing Lamp Left", radius: 0.4 };
          this.add(lampGroup1);
          this.movableObjects.push(lampGroup1);

          const lampGroup2 = new THREE.Group();
          const pole2 = new THREE.Mesh(lampPoleGeo, lampMat);
          pole2.position.y = 1.6;
          lampGroup2.add(pole2);
          const shade2 = new THREE.Mesh(shadeGeo, shadeMat);
          shade2.position.y = 2.8;
          lampGroup2.add(shade2);
          lampGroup2.position.set(4.0, 0, 4.0);
          lampGroup2.userData = { name: "Standing Lamp Right", radius: 0.4 };
          this.add(lampGroup2);
          this.movableObjects.push(lampGroup2);

          this.warmLight1 = new THREE.PointLight(0xfef08a, 2.0, 12);
          this.warmLight1.position.set(-4.0, 2.8, 4.0);
          this.warmLight1.castShadow = true;
          this.add(this.warmLight1);

          this.warmLight2 = new THREE.PointLight(0xfef08a, 2.0, 12);
          this.warmLight2.position.set(4.0, 2.8, 4.0);
          this.warmLight2.castShadow = true;
          this.add(this.warmLight2);

          this.lampLightList = [this.warmLight1, this.warmLight2];
        }

        createSensoryBubbles() {
          this.bubbles = [];
          const bubbleGeo = new THREE.SphereGeometry(1, 32, 32);
          const numBubbles = 40;
          let attempts = 0;

          while (this.bubbles.length < numBubbles && attempts < 800) {
            attempts++;
            const rx = (Math.random() - 0.5) * 8.0;
            const rz = (Math.random() - 0.5) * 8.0;
            const ry = Math.random() * 3.5 + 0.3;

            let tooClose = false;
            for (let b of this.bubbles) {
              const dx = b.position.x - rx;
              const dz = b.position.z - rz;
              if (Math.sqrt(dx * dx + dz * dz) < 1.2) {
                tooClose = true;
                break;
              }
            }

            if (!tooClose) {
              const scale = Math.random() * 0.12 + 0.05;
              const bubbleMat = new THREE.MeshPhysicalMaterial({
                color: 0x4299e1,
                transmission: 0.9,
                opacity: 1,
                transparent: true,
                roughness: 0.1,
                ior: 1.2,
                thickness: 0.5
              });
              const bubble = new THREE.Mesh(bubbleGeo, bubbleMat);
              bubble.scale.set(scale, scale, scale);
              bubble.position.set(rx, ry, rz);
              bubble.userData = {
                baseY: ry,
                speed: Math.random() * 0.8 + 0.4,
                wobbleSpeed: Math.random() * 2 + 1,
                wobbleOffset: Math.random() * Math.PI * 2
              };
              this.add(bubble);
              this.bubbles.push(bubble);
            }
          }
        }

        createWallSpotifyPlayer() {
          this.spotifyPanel = new xb.SpatialPanel({
            width: 1.8,
            height: 1.2,
            backgroundColor: '#0f172afc'
          });
          this.spotifyPanel.position.set(0.0, 2.0, -4.9);
          this.add(this.spotifyPanel);

          const grid = this.spotifyPanel.addGrid();
          
          const headerRow = grid.addRow({ weight: 0.2 });
          headerRow.addText({ text: "🎵 Spotify - Midnights (Til Dawn Edition)", fontColor: '#38bdf8', fontSize: 0.06 });

          const trackRow = grid.addRow({ weight: 0.3 });
          this.trackLabel = trackRow.addText({
            text: "Now Playing: Anti-Hero (Taylor Swift)",
            fontColor: '#ffffff',
            fontSize: 0.05
          });

          const statusRow = grid.addRow({ weight: 0.2 });
          this.statusDisplay = statusRow.addText({
            text: "⏸ (Click TV to Play Audio)",
            fontColor: '#94a3b8',
            fontSize: 0.045
          });

          const footerRow = grid.addRow({ weight: 0.3 });
          const playBtn = footerRow.addCol({ weight: 1.0 }).addTextButton({
            text: "▶ Play / Pause Ambient Soundscape",
            backgroundColor: '#0284c7',
            fontColor: '#ffffff',
            fontSize: 0.15
          });
          playBtn.onTriggered = () => {
            this.toggleAudio();
          };

          this.spotifyPanel.updateLayouts();
        }

        createWallControlAndSwitches() {
          this.ctrlPanel = new xb.SpatialPanel({
            width: 1.2,
            height: 1.4,
            backgroundColor: '#1e293bf8'
          });
          this.ctrlPanel.position.set(-4.9, 1.8, 0.0);
          this.ctrlPanel.rotation.y = Math.PI / 2;
          this.add(this.ctrlPanel);

          const grid = this.ctrlPanel.addGrid();
          grid.addRow({ weight: 0.15 }).addText({ text: "🎛️ Room Controls", fontColor: '#38bdf8', fontSize: 0.07 });

          const themeBtn = grid.addRow({ weight: 0.2 }).addTextButton({
            text: "🎨 Cycle Theme",
            backgroundColor: '#475569',
            fontColor: '#ffffff',
            fontSize: 0.18
          });
          themeBtn.onTriggered = () => {
            this.currentThemeIndex = (this.currentThemeIndex + 1) % this.themes.length;
            this.setTheme(this.currentThemeIndex);
          };

          const bubbleBtn = grid.addRow({ weight: 0.2 }).addTextButton({
            text: "🫧 Toggle Bubbles",
            backgroundColor: '#475569',
            fontColor: '#ffffff',
            fontSize: 0.18
          });
          bubbleBtn.onTriggered = () => {
            this.bubblesActive = !this.bubblesActive;
            for (let b of this.bubbles) b.visible = this.bubblesActive;
          };

          const lightBtn = grid.addRow({ weight: 0.2 }).addTextButton({
            text: "💡 Cycle Light Intensity",
            backgroundColor: '#475569',
            fontColor: '#ffffff',
            fontSize: 0.18
          });
          lightBtn.onTriggered = () => {
            this.cycleLightIntensity();
          };

          const lampToggleBtn = grid.addRow({ weight: 0.2 }).addTextButton({
            text: "🛋️ Toggle Lamps On/Off",
            backgroundColor: '#0284c7',
            fontColor: '#ffffff',
            fontSize: 0.18
          });
          lampToggleBtn.onTriggered = () => {
            this.lampsActive = !this.lampsActive;
            for (let l of this.lampLightList) l.intensity = this.lampsActive ? 2.0 : 0.0;
          };

          this.ctrlPanel.updateLayouts();
        }

        createOvalTableAndLavaLamp() {
          const tableGroup = new THREE.Group();
          const tableTopGeo = new THREE.CylinderGeometry(0.7, 0.7, 0.06, 32);
          tableTopGeo.scale(1.4, 1, 0.8);
          const tableMat = new THREE.MeshStandardMaterial({ color: 0x1e293b, roughness: 0.3 });
          const tableTop = new THREE.Mesh(tableTopGeo, tableMat);
          tableTop.position.y = 0.45;
          tableTop.castShadow = true;
          tableTop.receiveShadow = true;
          tableGroup.add(tableTop);

          const legGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.45, 16);
          const legMat = new THREE.MeshStandardMaterial({ color: 0x475569, metalness: 0.8 });
          
          for (let coords of [[-0.7, -0.3], [0.7, -0.3], [-0.7, 0.3], [0.7, 0.3]]) {
            const leg = new THREE.Mesh(legGeo, legMat);
            leg.position.set(coords[0], 0.225, coords[1]);
            leg.castShadow = true;
            tableGroup.add(leg);
          }

          tableGroup.position.set(0.0, 0.0, -1.5);
          tableGroup.userData = { name: "Oval Coffee Table", radius: 0.8 };
          this.add(tableGroup);
          this.movableObjects.push(tableGroup);

          this.lavaGroup = new THREE.Group();
          const baseGeo = new THREE.CylinderGeometry(0.08, 0.1, 0.12, 16);
          const glassGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.35, 16);
          const metalMat = new THREE.MeshStandardMaterial({ color: 0x334155, metalness: 0.9 });
          
          const base = new THREE.Mesh(baseGeo, metalMat);
          base.position.y = 0.06;
          this.lavaGroup.add(base);

          const glassMat = new THREE.MeshPhysicalMaterial({ color: 0xf43f5e, transmission: 0.6, transparent: true, opacity: 0.8 });
          const glass = new THREE.Mesh(glassGeo, glassMat);
          glass.position.y = 0.3;
          this.lavaGroup.add(glass);

          this.lavaLight = new THREE.PointLight(0xf43f5e, 2.0, 5);
          this.lavaLight.position.y = 0.3;
          this.lavaGroup.add(this.lavaLight);
          this.lampLightList.push(this.lavaLight);

          this.lavaGroup.position.set(0.0, 0.48, 0);
          tableGroup.add(this.lavaGroup);
        }

        setTheme(index) {
          const theme = this.themes[index];
          if (this.roomMesh) {
            this.roomMesh.material.color.setHex(theme.color);
          }
          if (this.directionalLight) {
            this.directionalLight.color.setHex(theme.lightColor);
          }
          for (let b of this.bubbles) {
            b.material.color.setHex(theme.bubbleColor);
          }
        }

        cycleLightIntensity() {
          this.lightIntensity = this.lightIntensity === 1.0 ? 1.5 : 
                                this.lightIntensity === 1.5 ? 2.0 : 1.0;
          this.directionalLight.intensity = this.lightIntensity * 1.8;
        }

        toggleAudio() {
          if (!this.audioCtx) {
            this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          }
          if (this.audioCtx.state === 'suspended') {
            this.audioCtx.resume();
          }

          if (this.isPlayingAudio) {
            if (this.oscillator) {
              this.oscillator.stop();
              this.oscillator.disconnect();
            }
            if (this.gainNode) {
              this.gainNode.disconnect();
            }
            this.isPlayingAudio = false;
            this.statusDisplay.setText("⏸ (Click TV to Play Audio)");
          } else {
            this.oscillator = this.audioCtx.createOscillator();
            this.gainNode = this.audioCtx.createGain();

            this.oscillator.type = 'sine';
            this.oscillator.frequency.setValueAtTime(220, this.audioCtx.currentTime);

            this.gainNode.gain.setValueAtTime(0.2, this.audioCtx.currentTime);

            this.oscillator.connect(this.gainNode);
            this.gainNode.connect(this.audioCtx.destination);

            this.oscillator.start();
            this.isPlayingAudio = true;
            this.statusDisplay.setText("▶ Playing Ambient Soundscape");
          }
        }

        update() {
          const delta = xb.getDeltaTime ? xb.getDeltaTime() : 0.016;
          const time = performance.now() * 0.001;

          for (let b of this.bubbles) {
            b.position.y += Math.sin(time * b.userData.wobbleSpeed + b.userData.wobbleOffset) * 0.003 * this.bubbleSpeedMultiplier;
            b.position.x += Math.cos(time * 0.5 + b.userData.wobbleOffset) * 0.001;
            if (b.position.y > 3.8) {
              b.position.y = 0.2;
            }
          }

          if (this.grabbedObject && this.grabController === 'desktop') {
            this.raycaster.setFromCamera(this.mouse, xb.core.camera);
            const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
            const targetPos = new THREE.Vector3();
            this.raycaster.ray.intersectPlane(plane, targetPos);
            if (targetPos) {
              this.grabbedObject.position.x = Math.max(-4, Math.min(4, targetPos.x));
              this.grabbedObject.position.z = Math.max(-4, Math.min(4, targetPos.z));
            }
          }

          const cam = xb.core.camera;
          const moveSpeed = 2.5 * delta;
          const turnSpeed = 1.5 * delta;

          if (this.keys.arrowLeft || this.keys.q) {
            cam.rotation.y += turnSpeed;
          }
          if (this.keys.arrowRight || this.keys.e) {
            cam.rotation.y -= turnSpeed;
          }

          const forward = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), cam.rotation.y);
          const right = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), cam.rotation.y);

          const nextPos = cam.position.clone();
          if (this.keys.w) nextPos.addScaledVector(forward, moveSpeed);
          if (this.keys.s) nextPos.addScaledVector(forward, -moveSpeed);
          if (this.keys.a) nextPos.addScaledVector(right, -moveSpeed);
          if (this.keys.d) nextPos.addScaledVector(right, moveSpeed);

          let colliding = false;
          const playerRadius = 0.3;
          
          if (nextPos.x < -4.5 || nextPos.x > 4.5 || nextPos.z < -4.5 || nextPos.z > 4.5) {
            colliding = true;
          }

          for (let obj of this.movableObjects) {
            const rad = obj.userData.radius || 0.5;
            const dx = nextPos.x - obj.position.x;
            const dz = nextPos.z - obj.position.z;
            if (Math.sqrt(dx * dx + dz * dz) < (playerRadius + rad)) {
              colliding = true;
              break;
            }
          }

          if (!colliding) {
            cam.position.copy(nextPos);
          }
        }
      }

      document.addEventListener('DOMContentLoaded', function () {
        const options = new xb.Options();
        options.enableUI();
        xb.add(new SensoryRoomScript());
        xb.init(options);
      });
    </script>
  </body>
</html>
